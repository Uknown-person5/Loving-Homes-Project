 <nav>
        <h1 class="logo"> <img src="assets/logo.png">  Loving Homes</h1>

            <a href="index.html">Home</a>

            <div class="accessibility-wrapper">
                <button id="acc-menu-btn" class="acc-main-btn">Accessibility</button>
                <div id="acc-content" class="acc-dropdown-content">
                    <div class="acc-item">
                        <span>Text Size:</span>
                        <div class="btn-group">
                            <button id="decrease-text">A-</button>
                            <button id="increase-text">A+</button>
                        </div>
                    </div>
                    <div class="acc-item">
                        <span>Theme:</span>
                        <button id="theme-toggle" class="btn-toggle">Dark</button>
                    </div>

                    <div class="acc-item">
                        <span>Audio:</span>
                        <button id="read-aloud-btn" class="btn-toggle">🔊 Read Page</button>
                        <button id="stop-read-btn" class="btn-toggle" style="display:none; background:red;">Stop</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

        <section id="home" class="hero">
        <div class="hero-overlay"></div>
        <img src="assets/dogHands.png" class="head-image">
        <div class="hero-content">
            <h2>Book a service</h2>
            <br>
            <p>Please fill out the form below to book a service for your dog.</p>
    </section>

    <section id="booking-form" class="container booking-section">
        <h3>Book a Service</h3>
        <form class="booking-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="Dog Name" required>
            <select required>
                <option value="">Select Service</option>
                <option>Premium</option>
                <option>Classic</option>
                <option>One day plan</option>
            </select>
            <input type="date" required>
            <button type="submit" class="btn-submit" formnovalidate>Submit Booking</button>
        </form>
    </section>

    <section id="contact" class="contact-section">
        <h3>Contact Us</h3>
        <p>📞 079-756-2462</p>
        <p>📧 LovingHomes on Instagram</p>
        <p>📍 Hong Kong</p>
    </section>

    <footer>
        © 2026 Loving Homes. All Rights Reserved.
    </footer>

<audio id="errorSound" preload="auto">
